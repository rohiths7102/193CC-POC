services:
  db:
    image: postgres:16-alpine
    container_name: membership-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: membership
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - membership_pgdata:/var/lib/postgresql/data

volumes:
  membership_pgdata:
